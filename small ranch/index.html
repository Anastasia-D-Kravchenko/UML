<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Ranch – Stable Management System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&display=swap');

  :root {
    --cream: #f5f0e8;
    --brown: #3d2b1f;
    --gold: #c9a84c;
    --rust: #8b4513;
    --sage: #6b7c5e;
    --dark: #1a1208;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.12) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
    pointer-events: none;
  }

  .horseshoe {
    font-size: 5rem;
    text-align: center;
    margin-bottom: 0.5rem;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 2px 30px rgba(201,168,76,0.3);
    line-height: 1;
  }

  .tagline {
    font-size: 1.1rem;
    color: rgba(245,240,232,0.55);
    text-align: center;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0.5rem 0 2.5rem;
    font-weight: 300;
  }

  .card {
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.2);
    animation: slideUp 0.7s ease both;
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  label {
    display: block;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
    margin-top: 1.2rem;
  }

  input[type=text], input[type=password] {
    width: 100%;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    padding: 0.65rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  select {
    width: 100%;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    padding: 0.65rem 1rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-top: 0;
    appearance: none;
  }

  select:focus { border-color: var(--gold); }
  select option { background: #1a1208; }

  .btn {
    display: block;
    width: 100%;
    margin-top: 2rem;
    padding: 0.9rem;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  }

  .btn:hover {
    background: #e0b85a;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.4);
  }

  .err {
    color: #e07a5f;
    font-size: 0.9rem;
    text-align: center;
    margin-top: 1rem;
    min-height: 1.2em;
  }

  .divider {
    border: none;
    border-top: 1px solid rgba(201,168,76,0.15);
    margin: 2rem 0 1.5rem;
  }

  .role-links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .role-link {
    display: block;
    text-align: center;
    padding: 0.5rem;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 3px;
    color: rgba(245,240,232,0.6);
    font-size: 0.85rem;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .role-link:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.07);
  }
</style>
</head>
<body>
<div class="horseshoe">🐴</div>
<div class="brand">Small Ranch</div>
<p class="tagline">Stable Management System</p>

<div class="card">
  <div class="role-links">
    <a class="role-link" href="owner.html">👑 Owner</a>
    <a class="role-link" href="instructor.html">🏇 Instructor</a>
    <a class="role-link" href="therapist.html">🧘 Therapist</a>
    <a class="role-link" href="helper.html">🔧 Helper</a>
    <a class="role-link" href="customer.html" style="grid-column:1/-1">🎟 Customer</a>
  </div>
</div>

<script>
function doLogin() {
  const uid = document.getElementById('uid').value.trim();
  const pwd = document.getElementById('pwd').value.trim();
  const role = document.getElementById('role').value;
  const err = document.getElementById('err');
  if (!uid || !pwd) { err.textContent = 'Please enter your credentials.'; return; }
  if (!role) { err.textContent = 'Please select your role.'; return; }
  err.textContent = '';
  window.location.href = role;
}
</script>
</body>
</html>
