<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Ranch – Therapist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&display=swap');
  :root{--cream:#f5f0e8;--brown:#3d2b1f;--gold:#c9a84c;--sage:#6b7c5e;--dark:#1a1208;--panel:rgba(245,240,232,0.05);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--cream);font-family:'Crimson Pro',serif;min-height:100vh;display:flex;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 60% 90%,rgba(107,124,94,0.18) 0%,transparent 55%);pointer-events:none;}
  .sidebar{width:240px;min-height:100vh;background:rgba(0,0,0,0.4);border-right:1px solid rgba(201,168,76,0.2);display:flex;flex-direction:column;padding:2rem 1.2rem;gap:0.3rem;position:fixed;top:0;left:0;}
  .logo{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold);margin-bottom:1.5rem;}
  .nav-btn{background:none;border:none;color:rgba(245,240,232,0.65);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.65rem 1rem;border-radius:3px;text-align:left;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.6rem;}
  .nav-btn:hover,.nav-btn.active{background:rgba(201,168,76,0.12);color:var(--gold);}
  .back{margin-top:auto;color:rgba(245,240,232,0.35);font-size:0.85rem;text-decoration:none;display:block;text-align:center;padding:0.5rem;border:1px solid rgba(201,168,76,0.1);border-radius:3px;transition:all 0.2s;}
  .back:hover{color:var(--gold);border-color:rgba(201,168,76,0.4);}
  .main{margin-left:240px;flex:1;padding:2rem 2.5rem;}
  .page-head h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:2rem;}
  .panel{background:var(--panel);border:1px solid rgba(201,168,76,0.18);border-radius:4px;padding:1.5rem;margin-bottom:1.5rem;}
  .panel h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:1rem;}
  .section{display:none;} .section.active{display:block;}
  label{display:block;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:0.3rem;margin-top:0.9rem;}
  select{width:100%;background:rgba(0,0,0,0.35);border:1px solid rgba(201,168,76,0.25);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.6rem 0.9rem;outline:none;}
  select:focus{border-color:var(--gold);}
  select option{background:#1a1208;}

  .note-card{background:rgba(107,124,94,0.12);border:1px solid rgba(107,124,94,0.35);border-radius:4px;padding:1.2rem;margin-bottom:1rem;transition:border-color 0.2s;}
  .note-card:hover{border-color:rgba(201,168,76,0.4);}
  .note-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.7rem;}
  .note-client{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold);}
  .note-date{font-size:0.8rem;color:rgba(245,240,232,0.4);}
  .note-lesson{font-size:0.82rem;color:rgba(245,240,232,0.45);margin-bottom:0.6rem;}
  .note-instructor{font-size:0.8rem;color:rgba(201,168,76,0.6);margin-bottom:0.5rem;}
  .note-text{color:rgba(245,240,232,0.85);line-height:1.65;font-size:0.97rem;}
  .filter-row{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .filter-row select{width:auto;min-width:160px;}
  .empty{color:rgba(245,240,232,0.35);font-size:0.95rem;padding:1rem 0;}
  .tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:20px;font-size:0.75rem;margin-left:0.4rem;background:rgba(107,124,94,0.3);color:rgba(245,240,232,0.6);}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">🧘 Therapist Panel</div>
  <button class="nav-btn active" onclick="show('notes',this)"><span>📋</span> Lesson Notes</button>
  <button class="nav-btn" onclick="show('hours',this)"><span>⏱</span> Working Hours</button>
  <a class="back" href="index.html">← Back to Login</a>
</nav>

<main class="main">

  <section class="section active" id="notes">
    <div class="page-head"><h1>Lesson Notes from Instructors</h1></div>
    <div class="filter-row">
      <div>
        <label for="filterClient" style="margin-top:0;">Filter by client</label>
        <select id="filterClient" onchange="renderNotes()">
          <option value="">All clients</option>
          <option>Jan Wiśniewski</option><option>Karolina Maj</option><option>Tomek Bryk</option><option>Anna Lis</option>
        </select>
      </div>
      <div>
        <label for="filterInst" style="margin-top:0;">Filter by instructor</label>
        <select id="filterInst" onchange="renderNotes()">
          <option value="">All instructors</option>
          <option>Anna Kowalska</option><option>Piotr Nowak</option>
        </select>
      </div>
    </div>
    <div class="panel">
      <h2>📝 Notes</h2>
      <div id="notesList"></div>
    </div>
  </section>

  <section class="section" id="hours">
    <div class="page-head"><h1>Working Hours</h1></div>
    <div class="panel">
      <h2>⏱ Log Hours</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div>
          <label for="hDate" style="margin-top:0;">Date</label>
          <select id="hDate" style="width:100%;background:rgba(0,0,0,0.35);border:1px solid rgba(201,168,76,0.25);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.6rem 0.9rem;outline:none;">
            <option>07/04/2026</option><option>08/04/2026</option><option>09/04/2026</option>
          </select>
        </div>
        <div>
          <label for="hTask" style="margin-top:0;">Session type</label>
          <select id="hTask" style="width:100%;background:rgba(0,0,0,0.35);border:1px solid rgba(201,168,76,0.25);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.6rem 0.9rem;outline:none;">
            <option>Hippotherapy session</option>
            <option>Client observation</option>
            <option>Documentation</option>
            <option>Team consultation</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="hStart">Start time</label>
          <input type="text" id="hStart" placeholder="08:00" style="width:100%;background:rgba(0,0,0,0.35);border:1px solid rgba(201,168,76,0.25);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.6rem 0.9rem;outline:none;">
        </div>
        <div>
          <label for="hEnd">End time</label>
          <input type="text" id="hEnd" placeholder="16:00" style="width:100%;background:rgba(0,0,0,0.35);border:1px solid rgba(201,168,76,0.25);border-radius:3px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.6rem 0.9rem;outline:none;">
        </div>
      </div>
      <button onclick="logHours()" style="padding:0.7rem 1.8rem;background:var(--gold);color:var(--dark);font-family:'Playfair Display',serif;font-weight:700;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;margin-top:1.2rem;">Log Hours</button>
    </div>
    <div class="panel">
      <h2>📆 This Week's Log</h2>
      <table style="width:100%;border-collapse:collapse;font-size:0.95rem;">
        <thead><tr>
          <th style="text-align:left;padding:0.5rem 0.8rem;color:var(--gold);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.25);">Date</th>
          <th style="text-align:left;padding:0.5rem 0.8rem;color:var(--gold);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.25);">Start</th>
          <th style="text-align:left;padding:0.5rem 0.8rem;color:var(--gold);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.25);">End</th>
          <th style="text-align:left;padding:0.5rem 0.8rem;color:var(--gold);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.25);">Hours</th>
          <th style="text-align:left;padding:0.5rem 0.8rem;color:var(--gold);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.25);">Type</th>
        </tr></thead>
        <tbody id="hoursTable"></tbody>
      </table>
      <div style="margin-top:1rem;color:var(--gold);font-size:1.1rem;">Total this week: <strong id="totalH">0</strong> hours</div>
    </div>
  </section>
</main>

<script>
const allNotes=[
  {client:'Jan Wiśniewski',date:'2026-04-07',lesson:'Mon 09:00 – Riding basics',instructor:'Anna Kowalska',
   text:'Jan showed improved balance today. Still tenses his shoulders when transitioning to trot. Recommended shoulder relaxation exercises between sessions. Emotional state: positive and motivated.'},
  {client:'Karolina Maj',date:'2026-04-05',lesson:'Wed 09:00 – Balance session',instructor:'Piotr Nowak',
   text:'Karolina had difficulty maintaining rhythm during canter. She became frustrated after the third attempt — gently redirected her focus to breathing. Progress on posture is visible compared to last week.'},
  {client:'Anna Lis',date:'2026-04-04',lesson:'Mon 11:00 – Trot practice',instructor:'Anna Kowalska',
   text:'Excellent session. Anna is gaining confidence significantly. She spontaneously asked to try independent steering. Emotionally calm and engaged.'},
  {client:'Tomek Bryk',date:'2026-04-06',lesson:'Tue 10:00 – Riding basics',instructor:'Piotr Nowak',
   text:'Tomek was distracted today — possible fatigue. He responded well to the horse but had trouble focusing on instructions. Suggest shorter session next time. Posture improving slowly.'},
  {client:'Jan Wiśniewski',date:'2026-04-01',lesson:'Wed 09:00 – Balance session',instructor:'Anna Kowalska',
   text:'Good session overall. Jan attempted canter for the first time. Slight anxiety visible at start but settled after first lap. Highly recommend continuation of this exercise.'},
];

const clients=[
  {name:'Jan Wiśniewski',age:34,notes:2,goal:'Rehabilitation after spine surgery',progress:'Good – improving balance & posture'},
  {name:'Karolina Maj',age:28,notes:1,goal:'Anxiety reduction therapy',progress:'Moderate – emotionally variable sessions'},
  {name:'Anna Lis',age:22,notes:1,goal:'Confidence building',progress:'Excellent – rapid development'},
  {name:'Tomek Bryk',age:19,notes:1,goal:'Sensory integration',progress:'Slow but steady improvement'},
];

function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function renderNotes(){
  const fc=document.getElementById('filterClient').value;
  const fi=document.getElementById('filterInst').value;
  const el=document.getElementById('notesList');
  const filtered=allNotes.filter(n=>(fc===''||n.client===fc)&&(fi===''||n.instructor===fi));
  if(filtered.length===0){el.innerHTML='<div class="empty">No notes matching the selected filters.</div>';return;}
  el.innerHTML=filtered.map(n=>`<div class="note-card">
    <div class="note-meta">
      <div>
        <div class="note-client">${n.client}<span class="tag">client</span></div>
        <div class="note-lesson">${n.lesson}</div>
        <div class="note-instructor">Instructor: ${n.instructor}</div>
      </div>
      <div class="note-date">${n.date}</div>
    </div>
    <div class="note-text">${n.text}</div>
  </div>`).join('');
}

function renderClients(){
  const el=document.getElementById('clientList');
  el.innerHTML=clients.map(c=>`<div style="background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,0.15);border-radius:3px;padding:1.2rem;margin-bottom:0.8rem;">
    <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
      <span style="font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold);">${c.name}</span>
      <span style="font-size:0.8rem;color:rgba(245,240,232,0.4);">Age ${c.age} · ${c.notes} note${c.notes!==1?'s':''}</span>
    </div>
    <div style="font-size:0.85rem;color:rgba(245,240,232,0.5);margin-bottom:0.3rem;">Goal: ${c.goal}</div>
    <div style="font-size:0.9rem;color:rgba(245,240,232,0.75);">Progress: ${c.progress}</div>
  </div>`).join('');
}

renderNotes();
renderClients();
</script>
</body>
</html>
